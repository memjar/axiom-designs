<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIOM // TARGETING OVERLAY</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --hud-bg: #050a0e;
  --hud-cyan: #00e5ff;
  --hud-amber: #ff9800;
  --hud-red: #ff1744;
  --hud-green: #00e676;
  --hud-gold: #ffd740;
  --hud-text: #c8dce8;
  --hud-text-dim: #4a6a7a;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--hud-bg);
  font-family: 'Share Tech Mono', monospace;
  color: var(--hud-text);
  font-size: 12px;
}

/* Scanlines */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 6px);
}

.overlay { position: fixed; inset: 0; }

/* Central reticle SVG */
.reticle-container {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 400px; height: 400px;
}

/* Corner data readouts */
.data-block {
  position: absolute;
  padding: 8px 12px;
  font-size: 11px;
  line-height: 1.6;
}
.data-block .label { color: var(--hud-text-dim); font-size: 9px; letter-spacing: 2px; }
.data-block .value { color: var(--hud-cyan); font-size: 16px; }
.data-block .unit { color: var(--hud-text-dim); font-size: 10px; }
.data-block.tl { top: 30px; left: 30px; }
.data-block.tr { top: 30px; right: 30px; text-align: right; }
.data-block.bl { bottom: 60px; left: 30px; }
.data-block.br { bottom: 60px; right: 30px; text-align: right; }

/* Altitude tape - left edge */
.alt-tape {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 50px;
  height: 300px;
  border-right: 1px solid rgba(0,229,255,0.3);
}
.alt-tick {
  position: absolute;
  right: 0;
  height: 1px;
  background: rgba(0,229,255,0.3);
  font-size: 9px;
  color: var(--hud-text-dim);
}
.alt-tick span { position: absolute; right: 18px; top: -6px; }
.alt-pointer {
  position: absolute;
  right: -8px;
  top: 50%;
  transform: translateY(-50%);
  width: 0; height: 0;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  border-left: 8px solid var(--hud-cyan);
}

/* Speed tape - bottom */
.spd-tape {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 40px;
  border-top: 1px solid rgba(0,229,255,0.3);
}
.spd-tick {
  position: absolute;
  top: 0;
  width: 1px;
  background: rgba(0,229,255,0.3);
}
.spd-tick span { position: absolute; top: 14px; left: -10px; font-size: 9px; color: var(--hud-text-dim); }
.spd-pointer {
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-bottom: 8px solid var(--hud-cyan);
}

/* Target lock brackets */
.lock-bracket {
  position: absolute;
  width: 30px; height: 30px;
  border-color: var(--hud-green);
  border-style: solid;
  transition: all 1.5s ease-in-out;
}
.lock-bracket.tl2 { border-width: 2px 0 0 2px; }
.lock-bracket.tr2 { border-width: 2px 2px 0 0; }
.lock-bracket.bl2 { border-width: 0 0 2px 2px; }
.lock-bracket.br2 { border-width: 0 2px 2px 0; }
.lock-brackets-container {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}

/* Threat diamonds */
.threat-diamond {
  position: absolute;
  width: 12px; height: 12px;
  border: 1px solid var(--hud-red);
  transform: rotate(45deg);
  opacity: 0.7;
}
.threat-diamond.friendly { border-color: var(--hud-green); }
.threat-diamond::after {
  content: '';
  position: absolute; inset: 3px;
  background: currentColor;
  opacity: 0.3;
}

/* Compass band */
.compass {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 400px;
  height: 24px;
  border: 1px solid rgba(0,229,255,0.2);
  overflow: hidden;
  background: rgba(5,10,14,0.8);
}
.compass-inner {
  position: absolute;
  top: 0;
  white-space: nowrap;
  height: 100%;
  display: flex;
  align-items: center;
  animation: compass-scroll 20s linear infinite;
  color: var(--hud-text-dim);
  font-size: 10px;
}
.compass-inner .cardinal { color: var(--hud-cyan); font-size: 12px; }
@keyframes compass-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.compass-pointer {
  position: absolute;
  top: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 26px;
  background: var(--hud-cyan);
  z-index: 2;
}

/* Range rings */
@keyframes range-pulse {
  0% { opacity: 0.15; transform: translate(-50%,-50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(1.8); }
}
.range-ring {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  border-radius: 50%;
  border: 1px solid var(--hud-cyan);
  pointer-events: none;
}
.range-ring.pulse {
  animation: range-pulse 3s ease-out infinite;
}

/* HUD status line */
.hud-status {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: var(--hud-text-dim);
  letter-spacing: 3px;
}
</style>
</head>
<body>
<div class="overlay">

  <!-- Compass -->
  <div class="compass">
    <div class="compass-pointer"></div>
    <div class="compass-inner" id="compass-strip"></div>
  </div>

  <!-- Range rings -->
  <div class="range-ring" style="width:200px;height:200px;opacity:0.12;"></div>
  <div class="range-ring" style="width:400px;height:400px;opacity:0.08;"></div>
  <div class="range-ring" style="width:600px;height:600px;opacity:0.05;"></div>
  <div class="range-ring pulse" style="width:150px;height:150px;"></div>

  <!-- Central reticle -->
  <div class="reticle-container">
    <svg viewBox="0 0 400 400" width="400" height="400">
      <!-- Outer ring -->
      <circle cx="200" cy="200" r="180" fill="none" stroke="rgba(0,229,255,0.15)" stroke-width="1"/>
      <!-- Inner rings -->
      <circle cx="200" cy="200" r="120" fill="none" stroke="rgba(0,229,255,0.12)" stroke-width="1" stroke-dasharray="4 8">
        <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="30s" repeatCount="indefinite"/>
      </circle>
      <circle cx="200" cy="200" r="70" fill="none" stroke="rgba(0,229,255,0.2)" stroke-width="1">
        <animateTransform attributeName="transform" type="rotate" from="360 200 200" to="0 200 200" dur="20s" repeatCount="indefinite"/>
      </circle>
      <circle cx="200" cy="200" r="30" fill="none" stroke="var(--hud-cyan)" stroke-width="1" opacity="0.5"/>

      <!-- Crosshairs -->
      <line x1="200" y1="20" x2="200" y2="170" stroke="rgba(0,229,255,0.3)" stroke-width="1"/>
      <line x1="200" y1="230" x2="200" y2="380" stroke="rgba(0,229,255,0.3)" stroke-width="1"/>
      <line x1="20" y1="200" x2="170" y2="200" stroke="rgba(0,229,255,0.3)" stroke-width="1"/>
      <line x1="230" y1="200" x2="380" y2="200" stroke="rgba(0,229,255,0.3)" stroke-width="1"/>

      <!-- Center dot -->
      <circle cx="200" cy="200" r="3" fill="var(--hud-cyan)" opacity="0.8"/>

      <!-- Rotating tick marks on outer ring -->
      <g opacity="0.4">
        <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="60s" repeatCount="indefinite"/>
        <line x1="200" y1="22" x2="200" y2="35" stroke="var(--hud-cyan)" stroke-width="1"/>
        <line x1="200" y1="365" x2="200" y2="378" stroke="var(--hud-cyan)" stroke-width="1"/>
        <line x1="22" y1="200" x2="35" y2="200" stroke="var(--hud-cyan)" stroke-width="1"/>
        <line x1="365" y1="200" x2="378" y2="200" stroke="var(--hud-cyan)" stroke-width="1"/>
      </g>

      <!-- Angle markers at 45deg -->
      <g opacity="0.3">
        <line x1="327" y1="73" x2="318" y2="82" stroke="var(--hud-cyan)" stroke-width="1"/>
        <line x1="73" y1="327" x2="82" y2="318" stroke="var(--hud-cyan)" stroke-width="1"/>
        <line x1="73" y1="73" x2="82" y2="82" stroke="var(--hud-cyan)" stroke-width="1"/>
        <line x1="327" y1="327" x2="318" y2="318" stroke="var(--hud-cyan)" stroke-width="1"/>
      </g>
    </svg>
  </div>

  <!-- Lock brackets (animated) -->
  <div class="lock-brackets-container" id="lock-container">
    <div class="lock-bracket tl2" id="lk-tl"></div>
    <div class="lock-bracket tr2" id="lk-tr"></div>
    <div class="lock-bracket bl2" id="lk-bl"></div>
    <div class="lock-bracket br2" id="lk-br"></div>
  </div>

  <!-- Data blocks -->
  <div class="data-block tl">
    <div class="label">SPEED</div>
    <div><span class="value" id="speed">342</span> <span class="unit">KTS</span></div>
    <div class="label" style="margin-top:8px;">MACH</div>
    <div><span class="value" style="font-size:13px;" id="mach">0.52</span></div>
  </div>
  <div class="data-block tr">
    <div class="label">BEARING</div>
    <div><span class="value" id="bearing">247</span><span class="unit">&deg;</span></div>
    <div class="label" style="margin-top:8px;">RANGE</div>
    <div><span class="value" style="font-size:13px;" id="range">12.4</span> <span class="unit">NM</span></div>
  </div>
  <div class="data-block bl">
    <div class="label">LATITUDE</div>
    <div><span class="value" style="font-size:13px;">37.7749&deg;N</span></div>
    <div class="label" style="margin-top:4px;">LONGITUDE</div>
    <div><span class="value" style="font-size:13px;">122.4194&deg;W</span></div>
  </div>
  <div class="data-block br">
    <div class="label">ALTITUDE</div>
    <div><span class="value" id="alt">28,400</span> <span class="unit">FT</span></div>
    <div class="label" style="margin-top:8px;">VS</div>
    <div><span class="value" style="font-size:13px;color:var(--hud-green);" id="vs">+120</span> <span class="unit">FPM</span></div>
  </div>

  <!-- Altitude tape (left) -->
  <div class="alt-tape" id="alt-tape">
    <div class="alt-pointer"></div>
  </div>

  <!-- Speed tape (bottom) -->
  <div class="spd-tape" id="spd-tape">
    <div class="spd-pointer"></div>
  </div>

  <!-- Threat diamonds -->
  <div class="threat-diamond" style="top:25%;right:20%;color:var(--hud-red);"></div>
  <div class="threat-diamond friendly" style="top:60%;right:15%;color:var(--hud-green);"></div>
  <div class="threat-diamond friendly" style="top:40%;left:18%;color:var(--hud-green);"></div>
  <div class="threat-diamond" style="bottom:30%;left:25%;color:var(--hud-red);"></div>
  <div class="threat-diamond friendly" style="top:20%;left:40%;color:var(--hud-green);"></div>

  <div class="hud-status">AXIOM TACTICAL OVERLAY v4.2 // MODE: SURVEY</div>
</div>

<script>
// Build compass strip
const strip = document.getElementById('compass-strip');
const dirs = ['N','015','030','045','E','075','090','105','S','135','150','165','W','195','210','225','N','015','030','045','E','075','090','105','S','135','150','165','W','195','210','225'];
strip.innerHTML = dirs.map(d =>
  ['N','E','S','W'].includes(d)
    ? `<span style="margin:0 16px" class="cardinal">${d}</span>`
    : `<span style="margin:0 12px">${d}</span>`
).join(' | ');

// Altitude tape ticks
const altTape = document.getElementById('alt-tape');
for (let i = 0; i < 7; i++) {
  const tick = document.createElement('div');
  tick.className = 'alt-tick';
  tick.style.top = (i * 50) + 'px';
  tick.style.width = (i % 2 === 0 ? 12 : 6) + 'px';
  if (i % 2 === 0) {
    const lbl = document.createElement('span');
    lbl.textContent = (31 - i * 1) + 'K';
    tick.appendChild(lbl);
  }
  altTape.appendChild(tick);
}

// Speed tape ticks
const spdTape = document.getElementById('spd-tape');
for (let i = 0; i < 7; i++) {
  const tick = document.createElement('div');
  tick.className = 'spd-tick';
  tick.style.left = (i * 50) + 'px';
  tick.style.height = (i % 2 === 0 ? 10 : 5) + 'px';
  if (i % 2 === 0) {
    const lbl = document.createElement('span');
    lbl.textContent = (300 + i * 20);
    tick.appendChild(lbl);
  }
  spdTape.appendChild(tick);
}

// Lock bracket animation
let lockSize = 120;
let lockDir = -1;
function animateLock() {
  lockSize += lockDir * 0.3;
  if (lockSize < 50) lockDir = 1;
  if (lockSize > 120) lockDir = -1;
  const half = lockSize / 2;
  document.getElementById('lk-tl').style.cssText = `position:absolute;top:${-half}px;left:${-half}px;width:30px;height:30px;border-width:2px 0 0 2px;border-style:solid;border-color:var(--hud-green);`;
  document.getElementById('lk-tr').style.cssText = `position:absolute;top:${-half}px;right:${-half}px;left:auto;width:30px;height:30px;border-width:2px 2px 0 0;border-style:solid;border-color:var(--hud-green);`;
  document.getElementById('lk-bl').style.cssText = `position:absolute;bottom:${-half}px;left:${-half}px;top:auto;width:30px;height:30px;border-width:0 0 2px 2px;border-style:solid;border-color:var(--hud-green);`;
  document.getElementById('lk-br').style.cssText = `position:absolute;bottom:${-half}px;right:${-half}px;top:auto;left:auto;width:30px;height:30px;border-width:0 2px 2px 0;border-style:solid;border-color:var(--hud-green);`;
  requestAnimationFrame(animateLock);
}
animateLock();

// Fluctuating readouts
setInterval(() => {
  document.getElementById('speed').textContent = (340 + Math.random() * 10).toFixed(0);
  document.getElementById('mach').textContent = (0.51 + Math.random() * 0.03).toFixed(2);
  document.getElementById('bearing').textContent = (245 + Math.random() * 5).toFixed(0);
  document.getElementById('range').textContent = (12 + Math.random() * 1).toFixed(1);
  document.getElementById('alt').textContent = (28000 + Math.random() * 800).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  document.getElementById('vs').textContent = '+' + (100 + Math.random() * 60).toFixed(0);
}, 1500);
</script>
</body>
</html>
